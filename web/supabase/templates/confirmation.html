<!DOCTYPE html>
<html>
<head>

    .container { max-width: 600px; margin: 0 auto; padding: 40px 20px; text-align: center; }
    h1 { color: #fff; font-size: 24px; margin-bottom: 16px; }
    p { color: #637381; font-size: 16px; margin-bottom: 24px; }

  </style>
</head>
<body>
  <div class="container">
    <h1>Welcome to the Grayjay Addon Manager!</h1>

    <a href="{{ .ConfirmationURL }}" class="btn">Confirm Email</a>
    <p style="margin-top: 32px; font-size: 14px;">If you didn't request this, you can safely ignore this email.</p>
  </div>
